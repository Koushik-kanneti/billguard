<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BillGuard — Scam Map</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet core -->
  <link  rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MarkerCluster -->
  <link  rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link  rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    html,body{height:100%;margin:0;padding:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    #map{position:absolute;inset:0;top:56px;z-index:0}

    /* ── Marker pin ── */
    .m-wrap{position:relative;width:36px;height:44px}
    .m-pin{width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
           border:3px solid rgba(255,255,255,.95);box-shadow:0 4px 12px rgba(0,0,0,.25);
           display:flex;align-items:center;justify-content:center;cursor:pointer}
    .m-pin .ico{transform:rotate(45deg);font-size:13px;line-height:1}
    .m-pin.red   {background:#ef4444}
    .m-pin.orange{background:#f97316}
    .m-pin.green {background:#22c55e}
    .m-pin::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
                  width:6px;height:6px;border-radius:50%;background:inherit;opacity:.4}
    /* Pulse ring for red */
    .m-wrap.pulse::before{content:'';position:absolute;width:44px;height:44px;border-radius:50%;
      background:rgba(239,68,68,.2);top:-6px;left:-6px;
      animation:pulse 2s ease-out infinite;pointer-events:none}
    @keyframes pulse{0%{transform:scale(.7);opacity:.8}70%{transform:scale(1.6);opacity:0}100%{transform:scale(.7);opacity:0}}

    /* ── Custom cluster ── */
    .custom-cluster{display:flex;align-items:center;justify-content:center;
      border-radius:50%;border:3px solid rgba(255,255,255,.9);
      box-shadow:0 3px 10px rgba(0,0,0,.22);color:#fff;font-weight:800;font-size:13px;
      transition:transform .15s}
    .custom-cluster:hover{transform:scale(1.1)}
    .cluster-red   .custom-cluster{background:#ef4444}
    .cluster-orange.custom-cluster,
    .custom-cluster.orange{background:#f97316}
    .custom-cluster.green {background:#22c55e}

    /* ── Side panel ── */
    #side-panel{
      position:fixed;right:0;top:56px;bottom:0;width:340px;
      background:#fff;z-index:9990;
      box-shadow:-8px 0 32px rgba(0,0,0,.12);
      display:flex;flex-direction:column;
      transform:translateX(100%);
      transition:transform .3s cubic-bezier(.4,0,.2,1);
    }
    #side-panel.open{transform:translateX(0)}
    #panel-reports{overflow-y:auto;flex:1}
    #panel-reports::-webkit-scrollbar{width:4px}
    #panel-reports::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}

    /* ── Leaflet attribution small ── */
    .leaflet-control-attribution{font-size:9px!important;opacity:.6}

    /* ── Filter pills ── */
    .pill{cursor:pointer;transition:all .15s;white-space:nowrap}
    .pill.active{background:#1e40af!important;color:#fff!important;border-color:#1e40af!important}

    /* ── Search ── */
    #search-results{max-height:260px;overflow-y:auto}
    #search-results::-webkit-scrollbar{width:4px}
    #search-results::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header style="position:fixed;top:0;left:0;right:0;height:56px;background:#fff;
  border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 16px;
  gap:12px;z-index:9999">
  <a href="/" style="width:36px;height:36px;background:#2563eb;border-radius:12px;
     display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;flex-shrink:0">🛡️</a>
  <div style="flex:1;min-width:0">
    <div style="font-weight:700;font-size:14px;color:#0f172a;line-height:1">Scam Map</div>
    <div id="stats-bar" style="font-size:11px;color:#94a3b8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Loading…</div>
  </div>
  <a href="/" style="font-size:12px;font-weight:600;color:#fff;background:#2563eb;
     padding:6px 14px;border-radius:8px;text-decoration:none;flex-shrink:0;
     transition:background .15s" onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">
    + Analyze Bill
  </a>
</header>

<!-- ── Map ───────────────────────────────────────────────────────────── -->
<div id="map"></div>

<!-- ── Search + Filters overlay ─────────────────────────────────────── -->
<div style="position:absolute;top:68px;left:0;right:0;padding:0 12px;z-index:9990;
            pointer-events:none;display:flex;flex-direction:column;gap:8px;align-items:center">

  <!-- Search box -->
  <div style="pointer-events:auto;position:relative;width:100%;max-width:420px">
    <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px;pointer-events:none">🔍</span>
    <input id="search-input" type="text" placeholder="Search hospital, restaurant, city…"
      oninput="onSearchInput()" onfocus="onSearchFocus()"
      style="width:100%;background:rgba(255,255,255,.97);border:1px solid #e2e8f0;border-radius:16px;
             padding:10px 36px 10px 36px;font-size:13px;outline:none;
             box-shadow:0 4px 20px rgba(0,0,0,.1);box-sizing:border-box;
             transition:box-shadow .2s"/>
    <button id="search-clear" onclick="clearSearch()" style="display:none;position:absolute;right:12px;
      top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;
      color:#94a3b8;font-size:18px;line-height:1;padding:0">×</button>
    <div id="search-results" style="display:none;position:absolute;width:100%;margin-top:6px;
      background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.12);
      border:1px solid #e2e8f0;overflow:hidden;z-index:50"></div>
  </div>

  <!-- Filter pills -->
  <div style="pointer-events:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:center">
    <button onclick="setFilter('all')"          id="pill-all"
      class="pill active" style="font-size:12px;font-weight:600;padding:6px 14px;
      border-radius:99px;border:1px solid #1e40af;background:#1e40af;color:#fff">All</button>
    <button onclick="setFilter('hospital')"     id="pill-hospital"
      class="pill" style="font-size:12px;font-weight:600;padding:6px 14px;
      border-radius:99px;border:1px solid #e2e8f0;background:rgba(255,255,255,.95);color:#374151;
      box-shadow:0 2px 8px rgba(0,0,0,.08)">🏥 Hospital</button>
    <button onclick="setFilter('restaurant')"   id="pill-restaurant"
      class="pill" style="font-size:12px;font-weight:600;padding:6px 14px;
      border-radius:99px;border:1px solid #e2e8f0;background:rgba(255,255,255,.95);color:#374151;
      box-shadow:0 2px 8px rgba(0,0,0,.08)">🍽️ Restaurant</button>
    <button onclick="setFilter('online_order')" id="pill-online_order"
      class="pill" style="font-size:12px;font-weight:600;padding:6px 14px;
      border-radius:99px;border:1px solid #e2e8f0;background:rgba(255,255,255,.95);color:#374151;
      box-shadow:0 2px 8px rgba(0,0,0,.08)">📱 Online Order</button>
  </div>
</div>

<!-- ── Legend ─────────────────────────────────────────────────────────── -->
<div style="position:absolute;bottom:28px;left:12px;z-index:9990;
  background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);border:1px solid #f1f5f9;
  padding:12px 14px;font-size:11px;min-width:170px">
  <div style="font-weight:700;color:#374151;margin-bottom:8px;font-size:12px">Risk Level</div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
    <span style="width:10px;height:10px;border-radius:50%;background:#ef4444;flex-shrink:0;
      box-shadow:0 0 6px rgba(239,68,68,.5)"></span>
    <span style="color:#475569">High — frequent overcharges</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
    <span style="width:10px;height:10px;border-radius:50%;background:#f97316;flex-shrink:0"></span>
    <span style="color:#475569">Medium — some issues</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <span style="width:10px;height:10px;border-radius:50%;background:#22c55e;flex-shrink:0"></span>
    <span style="color:#475569">Low — minor / single report</span>
  </div>
  <div style="border-top:1px solid #f1f5f9;padding-top:6px;color:#94a3b8">
    Marker size = report count
  </div>
</div>

<!-- ── Side Panel ─────────────────────────────────────────────────────── -->
<div id="side-panel">

  <!-- Panel header -->
  <div id="panel-header" style="padding:16px;border-bottom:1px solid #f1f5f9;flex-shrink:0">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span id="panel-icon" style="font-size:22px;flex-shrink:0"></span>
          <div id="panel-name" style="font-weight:800;font-size:16px;color:#0f172a;line-height:1.3"></div>
        </div>
        <div id="panel-address" style="font-size:12px;color:#64748b;line-height:1.4"></div>
      </div>
      <button onclick="closePanel()" style="flex-shrink:0;width:28px;height:28px;border-radius:50%;
        background:#f1f5f9;border:none;cursor:pointer;font-size:16px;line-height:1;
        display:flex;align-items:center;justify-content:center;color:#64748b;
        transition:background .15s" onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#f1f5f9'">×</button>
    </div>
  </div>

  <!-- Risk badge + stats -->
  <div style="padding:14px 16px;border-bottom:1px solid #f1f5f9;flex-shrink:0">
    <div id="panel-risk-badge" style="display:inline-flex;align-items:center;gap:6px;
      padding:5px 12px;border-radius:99px;font-size:12px;font-weight:700;margin-bottom:12px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div style="background:#f8fafc;border-radius:12px;padding:10px;text-align:center">
        <div id="panel-count" style="font-size:22px;font-weight:800;color:#1e40af"></div>
        <div style="font-size:10px;color:#94a3b8;margin-top:2px">Reports</div>
      </div>
      <div style="background:#fef2f2;border-radius:12px;padding:10px;text-align:center">
        <div id="panel-avg" style="font-size:16px;font-weight:800;color:#dc2626;line-height:1.2"></div>
        <div style="font-size:10px;color:#94a3b8;margin-top:2px">Avg overcharge</div>
      </div>
      <div style="background:#f0fdf4;border-radius:12px;padding:10px;text-align:center">
        <div id="panel-max" style="font-size:16px;font-weight:800;color:#16a34a;line-height:1.2"></div>
        <div style="font-size:10px;color:#94a3b8;margin-top:2px">Max overcharge</div>
      </div>
    </div>
  </div>

  <!-- Common issues -->
  <div style="padding:12px 16px;border-bottom:1px solid #f1f5f9;flex-shrink:0">
    <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;
      letter-spacing:.06em;margin-bottom:8px">Reported Issues</div>
    <div id="panel-issues" style="display:flex;flex-wrap:wrap;gap:6px"></div>
  </div>

  <!-- Report history -->
  <div id="panel-reports" style="padding:12px 16px;flex:1;overflow-y:auto">
    <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;
      letter-spacing:.06em;margin-bottom:10px">Report History</div>
    <div id="panel-history"></div>
  </div>
</div>

<!-- ── No results notice ──────────────────────────────────────────────── -->
<div id="no-markers-chip" style="display:none;position:absolute;bottom:28px;
  left:50%;transform:translateX(-50%);z-index:9990;
  background:rgba(255,255,255,.95);border:1px solid #e2e8f0;border-radius:99px;
  padding:8px 18px;font-size:13px;color:#64748b;font-weight:500;
  box-shadow:0 4px 16px rgba(0,0,0,.08)">
  No reports in this category yet
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const INDIA_BOUNDS = L.latLngBounds(L.latLng(6.5, 68.0), L.latLng(37.5, 97.5));
const BILL_ICON    = { hospital:"🏥", restaurant:"🍽️", online_order:"📱" };
const RISK_LABEL   = { red:"🔴 High Risk", orange:"🟡 Medium Risk", green:"🟢 Low Risk" };
const RISK_BG      = { red:"#fef2f2", orange:"#fff7ed", green:"#f0fdf4" };
const RISK_CLR     = { red:"#ef4444", orange:"#f97316", green:"#22c55e" };
const RISK_TXT     = { red:"#991b1b", orange:"#9a3412", green:"#14532d" };

// ── Map init ───────────────────────────────────────────────────────────────
const map = L.map("map", {
  zoomControl: false,
  maxBounds: INDIA_BOUNDS,
  maxBoundsViscosity: 0.85,
  minZoom: 4,
  maxZoom: 18,
}).setView([20.5937, 78.9629], 5);

L.control.zoom({ position:"bottomright" }).addTo(map);

// CartoDB Positron — clean, modern, minimal
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:"abcd", maxZoom:19,
}).addTo(map);

// ── Cluster group ──────────────────────────────────────────────────────────
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 55,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  iconCreateFunction(cluster) {
    const children = cluster.getAllChildMarkers();
    const hasRed    = children.some(m => m.options.riskColor === "red");
    const hasOrange = children.some(m => m.options.riskColor === "orange");
    const colorClass = hasRed ? "red" : (hasOrange ? "orange" : "green");
    const bgColor    = RISK_CLR[colorClass] || "#22c55e";
    const n = cluster.getChildCount();
    const size = n < 5 ? 34 : n < 20 ? 40 : 48;
    return L.divIcon({
      html:`<div class="custom-cluster" style="width:${size}px;height:${size}px;background:${bgColor};
             font-size:${size<38?12:14}px">${n}</div>`,
      className:`cluster-${colorClass}`,
      iconSize:[size, size],
      iconAnchor:[size/2, size/2],
    });
  },
});
map.addLayer(clusterGroup);

// ── Marker icon factory ────────────────────────────────────────────────────
function makeIcon(color, billType, reportCount) {
  const ico    = BILL_ICON[billType] || "📋";
  const isPulse= color === "red";
  const size   = Math.min(32 + reportCount * 2, 44);
  return L.divIcon({
    className: "",
    html:`<div class="m-wrap ${isPulse?"pulse":""}">
            <div class="m-pin ${color}" style="width:${size}px;height:${size}px">
              <span class="ico" style="font-size:${Math.round(size*0.42)}px">${ico}</span>
            </div>
          </div>`,
    iconSize:   [size, size+8],
    iconAnchor: [size/2, size+8],
    popupAnchor:[0, -(size+10)],
  });
}

// ── Data ───────────────────────────────────────────────────────────────────
let allMarkers    = [];
let leafletLayers = [];
let activeFilter  = "all";
let activeMarker  = null;

async function loadMarkers() {
  const res  = await fetch("/map/markers");
  allMarkers = await res.json();
  renderMarkers();
}

function renderMarkers() {
  clusterGroup.clearLayers();
  leafletLayers = [];

  const visible = activeFilter === "all"
    ? allMarkers
    : allMarkers.filter(m => m.bill_type === activeFilter);

  document.getElementById("no-markers-chip").style.display =
    visible.length === 0 ? "block" : "none";

  visible.forEach(m => {
    if (!m.lat || !m.lng) return;
    const marker = L.marker([m.lat, m.lng], {
      icon: makeIcon(m.risk_color, m.bill_type, m.report_count),
      title: m.business_name,
      riseOnHover: true,
      riskColor: m.risk_color,
    });
    marker.markerData = m;
    marker.on("click", () => openPanel(m));
    clusterGroup.addLayer(marker);
    leafletLayers.push(marker);
  });
}

// ── Side panel ─────────────────────────────────────────────────────────────
async function openPanel(m) {
  activeMarker = m;
  const panel = document.getElementById("side-panel");

  document.getElementById("panel-icon").textContent    = BILL_ICON[m.bill_type] || "📋";
  document.getElementById("panel-name").textContent    = m.business_name;
  document.getElementById("panel-address").textContent = m.address || "Location pinned on map";
  document.getElementById("panel-count").textContent   = m.report_count;
  document.getElementById("panel-avg").textContent     = "₹" + Math.round(m.avg_overcharge).toLocaleString("en-IN");
  document.getElementById("panel-max").textContent     = "₹" + Math.round(m.max_overcharge).toLocaleString("en-IN");

  const badge  = document.getElementById("panel-risk-badge");
  const color  = m.risk_color;
  badge.textContent   = RISK_LABEL[color] || "Unknown";
  badge.style.background = RISK_BG[color]  || "#f8fafc";
  badge.style.color      = RISK_TXT[color] || "#475569";
  badge.style.border     = `1px solid ${RISK_CLR[color] || "#e2e8f0"}`;

  const issuesEl = document.getElementById("panel-issues");
  issuesEl.innerHTML = m.common_issues.length
    ? m.common_issues.map(i =>
        `<span style="display:inline-block;background:#f1f5f9;color:#475569;
               font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid #e2e8f0">${i}</span>`
      ).join("")
    : `<span style="font-size:12px;color:#94a3b8">None recorded</span>`;

  document.getElementById("panel-history").innerHTML =
    `<div style="display:flex;justify-content:center;padding:16px">
       <div style="width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#2563eb;
         border-radius:50%;animation:spin .7s linear infinite"></div>
     </div>`;

  panel.classList.add("open");
  // Shift map left to keep marker visible
  setTimeout(() => {
    map.invalidateSize();
    map.panBy([170, 0], { animate: true, duration: 0.4 });
  }, 50);

  // Load history
  const res     = await fetch(`/map/business?name=${encodeURIComponent(m.business_name)}`);
  const reports = await res.json();
  renderHistory(reports);
}

function renderHistory(reports) {
  const el = document.getElementById("panel-history");
  if (!reports.length) {
    el.innerHTML = `<div style="font-size:12px;color:#94a3b8;text-align:center;padding:12px">No history available</div>`;
    return;
  }
  const RISK_DOT = { high:"🔴", medium:"🟡", low:"🟢", clean:"✅" };
  el.innerHTML = reports.map(r => {
    const issues = (r.issues || []).slice(0, 2).join(", ") || "No issues flagged";
    return `
    <div style="background:#f8fafc;border-radius:12px;padding:10px 12px;margin-bottom:8px;border:1px solid #f1f5f9">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:11px;color:#64748b">📅 ${r.timestamp || "—"}</span>
        <span style="font-size:11px;font-weight:700;color:#dc2626">₹${Math.round(r.estimated_overcharge || 0).toLocaleString("en-IN")}</span>
      </div>
      <div style="font-size:12px;color:#374151">${RISK_DOT[r.risk_level] || "📋"} ${(r.risk_level||"").toUpperCase()} RISK</div>
      <div style="font-size:11px;color:#94a3b8;margin-top:3px;line-height:1.4">${issues}</div>
    </div>`;
  }).join("");
}

function closePanel() {
  const panel = document.getElementById("side-panel");
  panel.classList.remove("open");
  activeMarker = null;
  setTimeout(() => {
    map.invalidateSize();
    map.panBy([-170, 0], { animate: true, duration: 0.4 });
  }, 50);
}

// ── Filter ─────────────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll(".pill").forEach(p => {
    p.classList.remove("active");
    p.style.background    = "rgba(255,255,255,.95)";
    p.style.color         = "#374151";
    p.style.borderColor   = "#e2e8f0";
  });
  const pill = document.getElementById(`pill-${f}`);
  pill.classList.add("active");
  pill.style.background  = "#1e40af";
  pill.style.color       = "#fff";
  pill.style.borderColor = "#1e40af";
  if (activeMarker) closePanel();
  renderMarkers();
}

// ── Stats ──────────────────────────────────────────────────────────────────
async function loadStats() {
  const res = await fetch("/map/stats");
  const s   = await res.json();
  document.getElementById("stats-bar").textContent =
    `${s.total_reports} reports · ${s.total_businesses} businesses · ₹${Math.round(s.total_overcharge).toLocaleString("en-IN")} overcharge tracked`;
}

// ── Search ─────────────────────────────────────────────────────────────────
let searchTimer = null;

function onSearchInput() {
  const q = document.getElementById("search-input").value.trim();
  document.getElementById("search-clear").style.display = q ? "block" : "none";
  clearTimeout(searchTimer);
  if (!q) { hideSearch(); return; }
  searchTimer = setTimeout(() => doSearch(q), 320);
}

function onSearchFocus() {
  const q = document.getElementById("search-input").value.trim();
  if (q) doSearch(q);
}

function clearSearch() {
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").style.display = "none";
  hideSearch();
}
function hideSearch() { document.getElementById("search-results").style.display = "none"; }

async function doSearch(q) {
  const res     = await fetch(`/map/search?q=${encodeURIComponent(q)}`);
  const results = await res.json();
  const el      = document.getElementById("search-results");

  if (!results.length) {
    el.innerHTML = `<div style="padding:12px 16px;font-size:13px;color:#94a3b8">No results for "${q}"</div>`;
  } else {
    el.innerHTML = results.map(r => `
      <button onclick='focusBusiness(${JSON.stringify(r.business_name)})'
        style="width:100%;text-align:left;padding:10px 14px;background:none;border:none;
               cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s"
        onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
        <span style="font-size:18px;flex-shrink:0">${BILL_ICON[r.bill_type]||"📋"}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.business_name}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.address||""}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;font-weight:700;color:${RISK_CLR[r.risk_color]||'#64748b'}">${r.report_count} report${r.report_count!==1?"s":""}</div>
          <div style="font-size:11px;color:#94a3b8">₹${Math.round(r.avg_overcharge)}</div>
        </div>
      </button>`).join(`<div style="height:1px;background:#f1f5f9;margin:0 14px"></div>`);
  }
  el.style.display = "block";
}

function focusBusiness(name) {
  hideSearch();
  document.getElementById("search-input").value = name;
  // Find and fly to matching layer
  for (const layer of leafletLayers) {
    if (layer.options?.title === name) {
      map.flyTo(layer.getLatLng(), 14, { duration: 1.4 });
      setTimeout(() => openPanel(layer.markerData), 1500);
      return;
    }
  }
}

document.addEventListener("click", e => {
  if (!e.target.closest("#search-input") && !e.target.closest("#search-results"))
    hideSearch();
});

// Close panel on map click
map.on("click", () => { if (activeMarker) closePanel(); });

// Spin keyframe (for loader)
const style = document.createElement("style");
style.textContent = "@keyframes spin{to{transform:rotate(360deg)}}";
document.head.appendChild(style);

// ── Init ───────────────────────────────────────────────────────────────────
loadStats();
loadMarkers();
</script>
</body>
</html>
